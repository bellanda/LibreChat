<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        /* HPE Corporate Clean Color Palette */
        :root {
            --primary: #0F2D5C;
            --secondary: #1D4E89;
            --accent: #A92525;
            --accent-light: #A94545;
            --success: #166534;
            --text: #475569;
            --muted: #94A3B8;
            --bg-light: #F5F7FB;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Calibri, Arial, sans-serif;
            color: var(--text);
            font-size: 11pt;
            line-height: 1.6;
        }

        /* Page layout with header/footer */
        @page {
            size: A4;
            margin: 40mm 20mm 30mm 20mm;

            @top-left {
                content: "HPE Intelligence Platform";
                font-size: 9pt;
                color: var(--muted);
                font-weight: normal;
            }

            @top-right {
                content: "{{ document_title }}";
                font-size: 9pt;
                color: var(--muted);
                font-weight: normal;
            }

            @bottom-left {
                content: "HPE Confidential";
                font-size: 9pt;
                color: var(--muted);
            }

            @bottom-right {
                content: "Page " counter(page) " of " counter(pages);
                font-size: 9pt;
                color: var(--muted);
            }
        }

        /* Document wrapper */
        .document {
            position: relative;
        }

        /* Header with accent bar */
        .header {
            border-bottom: 4px solid var(--accent);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .header.accent-top {
            padding-top: 15px;
            border-top: 4px solid var(--primary);
        }

        /* Title and metadata */
        .title {
            color: var(--primary);
            font-size: 28pt;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--secondary);
            font-size: 14pt;
            margin-bottom: 12px;
        }

        .metadata {
            display: flex;
            gap: 20px;
            font-size: 10pt;
            color: var(--muted);
            margin-top: 12px;
        }

        .metadata-item {
            display: inline-block;
        }

        .metadata-item strong {
            color: var(--text);
            margin-right: 4px;
        }

        .classification-badge {
            display: inline-block;
            background-color: var(--accent);
            color: white;
            padding: 4px 12px;
            border-radius: 3px;
            font-weight: bold;
            font-size: 10pt;
            margin-left: 10px;
        }

        /* Section styles */
        section {
            margin-bottom: 25px;
            page-break-inside: avoid;
        }

        section.page-break {
            page-break-before: always;
        }

        .section-title {
            color: var(--primary);
            font-size: 16pt;
            font-weight: bold;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 8px;
            margin-bottom: 15px;
        }

        .section-subtitle {
            color: var(--secondary);
            font-size: 13pt;
            font-weight: bold;
            margin-bottom: 10px;
            margin-top: 15px;
        }

        /* Summary/Abstract box */
        .abstract {
            background-color: var(--bg-light);
            border-left: 4px solid var(--primary);
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 2px;
        }

        .abstract-title {
            color: var(--primary);
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 11pt;
        }

        .abstract-content {
            color: var(--text);
            font-size: 10pt;
            line-height: 1.5;
        }

        /* KPI Grid */
        .kpi-grid {
            display: table;
            width: 100%;
            margin-bottom: 20px;
            border-collapse: collapse;
        }

        .kpi-row {
            display: table-row;
        }

        .kpi-card {
            display: table-cell;
            width: 25%;
            background-color: var(--bg-light);
            border: 1px solid #E2E8F0;
            padding: 15px;
            text-align: center;
            vertical-align: middle;
        }

        .kpi-card-half {
            width: 50%;
        }

        .kpi-value {
            color: var(--primary);
            font-size: 20pt;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .kpi-label {
            color: var(--muted);
            font-size: 10pt;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .kpi-delta {
            color: var(--success);
            font-size: 9pt;
            font-weight: bold;
            margin-top: 5px;
        }

        .kpi-delta.negative {
            color: var(--accent);
        }

        /* Content box */
        .content-box {
            background-color: white;
            border: 1px solid #E2E8F0;
            padding: 15px;
            margin-bottom: 15px;
        }

        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 15px;
        }

        th {
            background-color: var(--primary);
            color: white;
            padding: 10px;
            text-align: left;
            font-weight: bold;
            font-size: 10pt;
            border: 1px solid var(--primary);
        }

        td {
            padding: 8px 10px;
            border: 1px solid #E2E8F0;
            font-size: 10pt;
        }

        tr:nth-child(even) {
            background-color: #F9FAFC;
        }

        tr:nth-child(odd) {
            background-color: white;
        }

        /* Charts and images */
        img {
            max-width: 100%;
            height: auto;
            margin-bottom: 15px;
        }

        .chart-container {
            text-align: center;
            margin: 20px 0;
        }

        .chart-title {
            color: var(--text);
            font-weight: bold;
            font-size: 11pt;
            margin-bottom: 10px;
        }

        /* Paragraph styles */
        p {
            margin-bottom: 12px;
            text-align: justify;
        }

        p.lead {
            font-size: 12pt;
            font-weight: 500;
            color: var(--secondary);
            margin-bottom: 15px;
        }

        /* Bullet lists */
        ul, ol {
            margin-left: 20px;
            margin-bottom: 12px;
        }

        li {
            margin-bottom: 6px;
        }

        /* Footer section */
        .document-footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #E2E8F0;
            font-size: 9pt;
            color: var(--muted);
            text-align: center;
        }

        /* Utility classes */
        .text-center {
            text-align: center;
        }

        .text-right {
            text-align: right;
        }

        .text-muted {
            color: var(--muted);
        }

        .text-primary {
            color: var(--primary);
        }

        .text-accent {
            color: var(--accent);
        }

        .mt-20 {
            margin-top: 20px;
        }

        .mb-20 {
            margin-bottom: 20px;
        }

        .small {
            font-size: 9pt;
        }
    </style>
</head>
<body>
    <div class="document">
        {% block content %}
        <!-- Child templates override this -->
        {% endblock %}

        {% if footer_text %}
        <div class="document-footer">
            {{ footer_text }}
        </div>
        {% endif %}
    </div>
</body>
</html>
