        temperature: 1.0
        top_p: 1.0
        max_completion_tokens: 32768

      models:
        default: ['openai/gpt-oss-120b', 'openai/gpt-oss-20b']
        fetch: false

      titleConvo: true
      titleModel: 'openai/gpt-oss-20b'

      tokenConfig:
        'openai/gpt-oss-120b':
          context: 131072
          prompt: 0.15
          completion: 0.75
        'openai/gpt-oss-20b':
          context: 131072
