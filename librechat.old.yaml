  mistralModel: 'mistral-ocr-latest'
  apiKey: '${MISTRAL_API_KEY}'
  baseURL: 'https://api.mistral.ai/v1'
  strategy: 'mistral_ocr'

# Definition of custom endpoints
endpoints:
  all:
    promptPrefix: |
      📚 Prompt de Estilo Padrão
      Emojis: Normalmente, use‑os apenas nos cabeçalhos e talvez subitítulos (ex.: # 🚀 Título).
      Markdown: aplique listas, tabelas ou blocos de código somente quando melhorar a clareza da resposta.
      Concisão: Sua concisão padrão, com a qual foi treinado.
      Prioridade: memórias ou preferências do usuário sempre prevalecem sobre estas instruções.
      Fallback: se não houver preferência explícita, siga este padrão ou o que achar melhor para o prompt do usuário.

  openAI:
    titleConvo: true
    titleModel: 'gpt-5-nano-no-reasoning'

  google:
    titleConvo: true
    titleModel: 'gemini-2.5-flash-lite'

  anthropic:
    titleConvo: true
    titleModel: 'claude-haiku-4-5'

  azureOpenAI:
    titleModel: 'gpt-5-nano-no-reasoning'
    titleConvo: true

    groups:
      # GPT-5.2 Medium
      - group: 'gpt-5.2-medium'
        apiKey: '${AZURE_API_KEY}'
        instanceName: 'ai-foundry-hpe-resource'
        deploymentName: 'gpt-5.2'
        version: '2025-01-01-preview'
        models:
          'gpt-5.2-medium': true
        addParams:
          useResponsesApi: true
          reasoning:
            effort: 'medium'
            summary: 'detailed'

      # GPT-5.2 XHigh
      - group: 'gpt-5.2-xhigh'
        apiKey: '${AZURE_API_KEY}'
        instanceName: 'ai-foundry-hpe-resource'
        deploymentName: 'gpt-5.2'
        version: '2025-01-01-preview'
        models:
          'gpt-5.2-xhigh': true
        addParams:
          useResponsesApi: true
          reasoning:
            effort: 'xhigh'
            summary: 'detailed'

      # GPT-5.2 Codex
      - group: 'gpt-5.2-codex-xhigh'
        apiKey: '${AZURE_API_KEY}'
        instanceName: 'ai-foundry-hpe-resource'
        deploymentName: 'gpt-5.2-codex'
        version: '2025-01-01-preview'
        models:
          'gpt-5.2-codex-xhigh': true
        addParams:
          useResponsesApi: true
          reasoning:
            effort: 'xhigh'
            summary: 'detailed'

  agents:
