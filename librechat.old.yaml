      ## 🎯 1. **Objetivo**  

      Esta política (**“Política de IA”**) tem como objetivo estabelecer diretrizes claras e abrangentes para o uso **seguro, transparente e responsável** de ferramentas de Inteligência Artificial no âmbito organizacional.

      - O uso responsável da IA permite ganhos significativos em **produtividade, criatividade** e **suporte à tomada de decisão**, atuando como ferramenta estratégica de apoio aos processos internos.  
      - Esse uso deverá estar sempre alinhado aos **valores da HPE** – conforme constam no nosso **Código de Ética e Conduta dos Colaboradores** – ou seja, em estrita conformidade com os princípios éticos e demais políticas internas.  

      ---  

      ## 🌍 2. **Abrangência**  

      Esta política se aplica a **todos os colaboradores da HPE Automotores do Brasil Ltda. (“HPE”)** e das demais empresas do Grupo. Também se estende, quando aplicável, a **terceiros, prestadores de serviço e parceiros** que utilizem, direta ou indiretamente, as ferramentas de IA fornecidas ou autorizadas pela HPE, identificados nesta política como **“Usuários”**.  

      ---  

      ## 📚 3. **Definições**  

      | **Termo** | **Definição** |
      |-----------|---------------|
      | **Agentes de IA** | Programas ou sistemas que utilizam Inteligência Artificial para executar atividades de forma autônoma ou semiautônoma. Podem interagir com pessoas, outros sistemas ou até com outros agentes de IA (ex.: chatbots, assistentes virtuais, softwares de monitoramento automático). |
      | **Agentes Autônomos** | Modelos de IA que podem realizar tarefas complexas sem supervisão humana constante, aprendendo com o ambiente e tomando decisões baseadas em seus objetivos. |
      | **Algoritmos** | Conjuntos de instruções lógicas e matemáticas que orientam como um dispositivo ou sistema deve processar informações para alcançar determinado resultado. |
      | **Alucinações** | Geração de conteúdo **falso, incoerente ou inventado** por um modelo de IA, ainda que pareça plausível. Ocorrem quando o modelo “preenche lacunas” de conhecimento com padrões aprendidos, não baseados em dados reais. |
      | **Ataques Cibernéticos** | Ações maliciosas realizadas por indivíduos ou grupos com o objetivo de comprometer sistemas, redes ou dados (ex.: roubo de informações, interrupção de serviços, fraude, espionagem). |
      | **Backup** | Cópia de segurança das informações, realizada para evitar perdas em caso de falhas técnicas, exclusão acidental, ataques cibernéticos ou desastres. |
      | **Criptografia** | Técnica de proteção que transforma informações em um código indecifrável para quem não possui a chave correta de leitura. |
      | **Dados Pessoais** | Informações que identificam ou permitem identificar uma pessoa, direta ou indiretamente (nome, CPF, RG, e‑mail, telefone, endereço, geolocalização, identificadores digitais etc.). |
      | **IA Generativa** | Tipo de IA projetada para desenvolver conteúdo a partir de grandes volumes de dados já existentes (texto, imagens, músicas, vídeos, código). |
      | **Identificadores Digitais** | Informações eletrônicas que permitem reconhecer ou diferenciar um usuário, dispositivo ou conexão na internet. |
      | **Incidentes de Segurança** | Eventos que afetam a **confidencialidade, integridade ou disponibilidade** de informações e sistemas. |
      | **Modelos de IA** | Estruturas matemáticas e computacionais treinadas com grandes volumes de dados para reconhecer padrões, tomar decisões ou gerar resultados de forma automática. |
      | **Prompt** | Comando, pergunta ou instrução fornecida a um sistema de IA para direcionar sua resposta ou ação. Quanto mais claro e detalhado for o prompt, maior a chance de gerar um resultado útil e adequado. |

      ---  

      ## 🤖 4. **Inteligência Artificial**  

      Inteligência Artificial (**IA**) é um ramo da ciência da computação voltado ao desenvolvimento de sistemas capazes de executar tarefas que tradicionalmente requerem a **inteligência humana**, tais como raciocínio, aprendizado, percepção e tomada de decisão.

      No contexto corporativo, a IA generativa pode ser utilizada para diversas finalidades, como, por exemplo:

      - Apoio à redação de documentos;  
      - Elaboração de relatórios;  
      - Criação de apresentações;  
      - Personalização de campanhas de marketing;  
      - Automação de atendimento ao cliente;  
      - Geração de insights estratégicos a partir de padrões aprendidos em grandes volumes de dados.  

      ---  

      ## ⚖️ 5. **Princípios Orientadores do Uso Ético de Ferramentas de IA**  

      O uso da IA deverá estar sempre alinhado aos seguintes princípios orientadores:

      - **Diversidade, Equidade e Não Discriminação** – garantir que os resultados não reforcem preconceitos ou discriminações contra indivíduos ou grupos, respeitando dignidade, igualdade e diversidade.  
      - **Melhoria Contínua** – garantir que os sistemas de IA sejam revisados e aprimorados regularmente, ajustando‑os às novas necessidades de negócio e aos desafios éticos/tecnológicos.  
      - **Privacidade e Governança dos Dados** – garantir que os dados pessoais sejam tratados com respeito à privacidade dos indivíduos, em conformidade com a legislação de proteção de dados.  
      - **Responsabilidade** – garantir supervisão humana adequada em toda decisão relevante, especialmente aquelas que possam impactar pessoas, processos ou resultados críticos.  
      - **Segurança e Confiabilidade** – proteger dados sensíveis e sigilosos, evitando a exposição de informações pessoais de clientes e colaboradores; utilizar IA apenas em dispositivos e redes corporativas seguras e homologadas.  
      - **Transparência** – garantir definição clara dos modelos utilizados e a finalidade de sua utilização, assegurando rastreabilidade, documentação e atribuição clara de responsabilidade ao longo de todo o ciclo de uso da IA.  

      ---  

      ## 👥 6. **Comitê de IA**  

      O **Comitê de Inteligência Artificial** será responsável por coordenar e supervisionar o uso das tecnologias de IA na organização, assegurando que sua aplicação esteja alinhada aos princípios éticos, à proteção de dados pessoais, às exigências legais e às diretrizes estratégicas da empresa.

      ### 👥 **Composição**  
      - **Compliance e Privacidade de Dados**  
      - **Tecnologia da Informação**  
      - **Gente & Gestão**  
      - **Gestão de Riscos** (quando necessário)

      ### 📌 **Atribuições**  

      1. **Orientar e treinar** os colaboradores no uso de IA, promovendo conscientização sobre riscos, responsabilidades e limitações.  
      2. **Definir critérios de homologação** para plataformas de IA autorizadas, avaliando riscos técnicos e regulatórios.  
      3. **Validar o ambiente de uso** das ferramentas de IA (infraestrutura segura, controle de acesso, criptografia, backup, etc.).  
      4. **Monitorar o uso** das ferramentas de IA, assegurando rastreabilidade, prevenção de incidentes e conformidade com os controles estabelecidos.  
      5. **Avaliar impactos** em segurança e privacidade decorrentes da adoção da IA em projetos, produtos, processos ou iniciativas estratégicas.  

      ---  

      ## 🔧 7. **Plataformas de IA Autorizadas para Uso**  

      Os colaboradores da HPE devem utilizar **exclusivamente** as plataformas e sistemas oficialmente autorizados nesta política. É **expressamente proibido** utilizar modelos de IA que não sejam a **HPE‑IA** ou que não estejam homologados.

      ### 🛠️ 7.1 **HPE‑IA**  

      Este é o modelo oficial para uso de IA generativa da HPE, criado como solução interna. A plataforma disponibiliza acesso a diversos modelos de IA de alto nível encontrados no mercado (ex.: ChatGPT, Gemini, etc.), todos integrados em um ambiente seguro e fácil de usar, garantindo maior segurança e integridade na governança dos dados corporativos, além de alta capacidade de auditoria e transparência.  

      ### 🛠️ 7.2 **Outras Plataformas Homologadas**  

      Caso surja necessidade de utilização de outras plataformas e sistemas que não sejam a HPE‑IA, devem ser analisados os seguintes critérios:

      - **Critério 1** – O sistema utiliza IA em sua totalidade e não pode ser contemplado na plataforma HPE‑IA.  
      - **Critério 2** – O sistema não utiliza IA em sua totalidade, mas possui recursos de IA significativos.  
      - **Critério 3** – O fornecedor da HPE não foi contratado originalmente para fornecer produtos ou serviços que utilizam IA.

      #### 📄 **Requerimento de Homologação**  

      O requerimento deve ser enviado para **ia.comite@hpeautos.com.br** contendo, de forma detalhada:

      1. **Aprovação prévia** do gestor (quando aplicável).  
      2. **Finalidade do uso** da plataforma ou sistema.  
      3. **Detalhamento dos dados** que serão utilizados:  
        - (i) Dados pessoais (sensíveis ou não) – ex.: e‑mail, nome, CPF, etc.;  
        - (ii) Informações da empresa (confidenciais ou não) – ex.: tabelas, manuais, relatórios, contratos, planilhas;  
        - (iii) Tipo de modelo de treinamento ou agente autônomo;  
        - (iv) Tempo de utilização (temporária ou permanente);  
        - (v) Colaboradores que terão acesso à ferramenta.  

      #### ⏱️ **SLA de Homologação**  

      - **15 (quinze) dias úteis** para plataformas que **não** necessitem de testes de uso;  
      - **30 (trinta) dias úteis** para plataformas que **exijam** testes de uso.  

      > **Importante:** O uso de plataformas não homologadas é **vedado** e pode ser configurado como atitude antiética, nos termos do item 7.2.9 do Código de Ética e Conduta da HPE, sujeitando o responsável a medidas disciplinares.  

      ---  

      ## 🛠️ 8. **Diretrizes de Uso**  

      O uso da plataforma **HPE‑IA** e demais sistemas homologados deve estar em conformidade com o **Código de Ética e Conduta dos Colaboradores**, a **Política de Privacidade e Proteção de Dados Pessoais**, a **Política de Segurança da Informação**, bem como demais políticas internas da HPE.

      ### ✅ **É permitido utilizar a IA para:**  

      - Apoiar a criação de conteúdos (e‑mails, relatórios, apresentações, documentos técnicos etc.).  
      - Otimizar tarefas administrativas, revisão textual, traduções e análise de dados.  
      - Explorar soluções e conceitos inovadores relacionados ao setor automotivo.  
      - Desenvolver ideias e realizar simulações a fim de obter melhorias em processos.  
      - Apoiar capacitação interna, mediante uso da IA para simulação de cenários e aprendizado.  
      - Auxiliar na tomada de decisões, **desde que** haja validação humana e supervisão técnica apropriada.  

      ### ❌ **É expressamente proibido:**  

      - Utilizar IA que viole leis de direitos autorais ou a Lei da Propriedade Industrial (Lei nº 9.279/1996).  
      - Tomar decisões automatizadas com impacto financeiro, jurídico, regulatório ou operacional **sem** revisão humana.  

      ---  

      ## ✅ 8.1 **Responsabilidade dos Usuários**  

      O uso de ferramentas de IA generativa exige que o usuário atue com responsabilidade e integridade. Cabe ao usuário interpretar criticamente as informações geradas, revisar seu conteúdo e garantir sua precisão, relevância e conformidade com as diretrizes institucionais.

      - **Explicar e justificar** qualquer resultado impreciso, validando criticamente o conteúdo antes de utilizá‑lo, mitigando “alucinações”.  
      - **Validar criticamente** o conteúdo gerado antes de utilizá‑lo.  
      - **Revisar o conteúdo** para garantir que não contenha elementos discriminatórios (raça, cor, religião, sexo, nacionalidade, idade, deficiência, estado civil, filiação política, orientação sexual ou qualquer forma de discriminação vedada por lei).  
      - **Reportar** incidentes de segurança, dúvidas, usos indevidos ou vazamento de informações à área de Segurança da Informação **imediatamente** via **incidentes@hpeautos.com.br**.  

      ---  

      ## 🔐 9. **Segurança da Informação**  

      A área de **Segurança da Informação** da HPE atuará na proteção dos sistemas e dados corporativos, além de gerenciar incidentes de segurança da informação e garantir controles adequados para a cibersegurança.  

      ---  

      ## 💾 10. **Armazenamento e Retenção de Dados**  

      Com o objetivo de garantir a segurança da informação, a privacidade e a conformidade com legislações aplicáveis, todas as interações realizadas com as ferramentas de Inteligência Artificial generativa, por meio dos sistemas homologados pelo Comitê de IA, estarão sujeitas às seguintes diretrizes de **temporalidade e retenção de dados**:

      - **Retenção de Dados** – As informações inseridas e geradas durante o uso das plataformas de IA serão armazenadas **temporariamente**, apenas pelo tempo estritamente necessário para cumprir a finalidade da interação.  
      - **Prazo de Retenção** – O prazo pode variar conforme a arquitetura, configuração e política de armazenamento adotada por cada modelo ou sistema. Quando possível, a HPE adotará medidas para limitar a retenção ao mínimo necessário, promovendo a eliminação automática dos registros após seu uso.  
      - **Exceções e Auditoria** – Em casos de auditoria, análise de segurança ou investigação formal, os dados poderão ser preservados por período superior, conforme determinação legal ou regulatória, sempre mediante **autorização expressa** das diretorias envolvidas no Comitê de IA.  

      ---  

      ## 📈 11. **Monitoramento, Auditoria e Penalidades**  

      A HPE poderá **monitorar** o uso das ferramentas de IA com fins de auditoria, segurança e conformidade com normas e políticas internas.  

      > **Sanções**  
      > Violação desta política pode acarretar **advertências, suspensão do contrato de trabalho, demissão** (com ou sem justa causa) e/ou responsabilização **civil, administrativa e/ou criminal**, conforme a gravidade do caso.  

      ---  

      ## 📖 12. **Referências**  

      - ISO/IEC 27001:2022 – Sistema de Gestão de Segurança da Informação  
      - ISO/IEC 42001:2023 – Sistema de Gestão de IA  
      - Lei Geral de Proteção de Dados (LGPD – Lei nº 13.709/2018)  
      - Regulamento (EU) 224/1689, (“IA Act”), de 13 de junho 2024  

      ---  

      ## 🔄 13. **Atualizações**  

      Esta política poderá ser **atualizada** sempre que houver mudanças em regulamentações, avanços tecnológicos ou alterações nas necessidades e diretrizes da organização.  

